<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML Vite Starter</title>
</head>
<body>
  <div id="app">
    <header>
      <nav>
        <span class="logo">ViteApp</span>
      </nav>
    </header>

    <main>
      <section class="hero">
        <h1>HTML + Vite Starter</h1>
        <p>Fast builds, hot module replacement, and modern ES modules — no framework required.</p>

        <div class="counter">
          <button id="decrement" aria-label="Decrement">−</button>
          <output id="count">0</output>
          <button id="increment" aria-label="Increment">+</button>
        </div>
        <p class="counter-hint">Click the buttons to interact.</p>
      </section>
    </main>

    <footer>
      <p>Built with <a href="https://vite.dev" target="_blank" rel="noopener">Vite</a></p>
    </footer>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
